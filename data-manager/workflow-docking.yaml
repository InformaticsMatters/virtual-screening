---
kind: DataManagerWorkflow
kind-version: "2025.2"
name: rdock-docking-workflow
description: >-
  Workflow that performs docking using rDock

steps:
  - name: split
    description: Split an input file
    specification:
      collection: file-utils
      job: sdf-splitter
      version: "1.0.0"
      variables:
        count: 100
        outputFile: outputFile
    plumbing:
      - variable: inputFile
        from-workflow:
          variable: candidateMolecules
      - variable: inputFile
        from-project:

  - name: enumerate
    description: Enumerate candidate molecules
    specification:
      collection: im-virtual-screening
      job: enumerate-candidates
      version: "1.0.0"
      variables:
        maxHac: 25
        outputFile: enumerated.sdf
    plumbing:
      - variable: inputFile
        from-step:
          name: split
          variable: outputFile

  # there would be a rDock step here,
  # but we don't yet have this as a job (only part of Nextflow workflow)

  - name: combine
    description: Combine the calculated files
    specification:
      collection: file-utils
      job: concatenator
      version: "1.0.0"
      variables:
        filesGlob: .instance-*/calculated.sdf
    plumbing:
      - variable: outputFile
        from-workflow:
          variable: resultsFile
      - variable: inputFile
        from-step:
          name: calculate
          variable: outputFile
      - variable: outputFile
        to-project: